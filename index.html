<!DOCTYPE html>
<html>
<head>
  <title>Video Player</title>
</head>
<body style="text-align:center; margin-top:50px; font-family:Arial;'>

  <h1>Video Player</h1>

  <input id="videoURL" type="text" placeholder="Paste YouTube link here" style="width:300px;">
  <br><br>
  <button onclick="loadVideo()">Play Video</button>

  <br><br>
  
  <iframe id="player" width="560" height="315' frameborder="0" allowfullscreen></iframe>
  
  <script>
  function getVideoID(url) {
    let regExp = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/;
    let match = url.match(regExp);
    return match ? match[1] : null;
  }

  function loadVideo() {
    let url = document.getElementById("videoURL").value;
    let videoID = getVideoID(url);

    if (videoID) {
      document.getElementById("player").src =
        "https://www.youtube-cookie.com/embed/" + videoID;
    } else {
      alert("Invalid link");
    }
  }
</script>

</body>
</html>
